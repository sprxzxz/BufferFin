<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#1e1b4b" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#09090b" stop-opacity="1"/>
    </radialGradient>

    <!-- Brand Gradients -->
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="50%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>

    <linearGradient id="secondaryGrad" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>

    <!-- Glossy Overlay -->
    <linearGradient id="glossGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>

    <!-- Soft Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background rounded card style for general asset usage, transparent outer is standard for favicons -->
  <rect width="512" height="512" rx="112" fill="#09090b" />
  <rect width="504" height="504" x="4" y="4" rx="108" fill="url(#bgGrad)" stroke="#27272a" stroke-width="8" />

  <!-- Ambient Glow Behind Logo -->
  <ellipse cx="256" cy="256" rx="120" ry="120" fill="#4f46e5" opacity="0.15" filter="url(#glow)" />

  <g transform="translate(116, 116)">
    <!-- Lower/Back Buffer (Emerald Flow) -->
    <path d="M 40,160 C 40,120 70,80 120,80 L 210,80 C 230,80 240,100 225,115 L 145,195 C 130,210 110,210 95,195 L 45,145 C 41,141 40,137 40,132 Z" 
          fill="url(#secondaryGrad)" />

    <!-- Upper/Front Buffer (Indigo Flow forming 'B') -->
    <path d="M 40,110 C 40,65 75,30 120,30 L 200,30 C 245,30 280,65 280,110 C 280,135 265,155 245,165 C 265,175 280,195 280,220 C 280,265 245,300 200,300 L 120,300 C 75,300 40,265 40,220 Z" 
          fill="url(#primaryGrad)" 
          filter="url(#glow)" />

    <!-- Inner 'B' cutouts to reveal layering and dimension -->
    <path d="M 100,80 L 170,80 C 185,80 195,90 195,105 C 195,120 185,130 170,130 L 100,130 Z" fill="#09090b" opacity="0.95" />
    <path d="M 100,170 L 170,170 C 185,170 195,180 195,195 C 195,210 185,220 170,220 L 100,220 Z" fill="#09090b" opacity="0.95" />

    <!-- Highlighting gloss overlay for 3D look -->
    <path d="M 40,110 C 40,65 75,30 120,30 L 200,30 C 245,30 280,65 280,110 C 280,135 265,155 245,165" 
          fill="none" 
          stroke="url(#glossGrad)" 
          stroke-width="6" 
          stroke-linecap="round" />
  </g>

  <!-- Centered Accent Dot (Core stability node) -->
  <circle cx="256" cy="256" r="14" fill="#ffffff" filter="url(#glow)" />
</svg>
